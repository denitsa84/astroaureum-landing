    // Seed-based random for consistent daily results
    function seededRandom(seed) {
      var x = Math.sin(seed) * 10000;
      return x - Math.floor(x);
    }

    var today = new Date();
    var dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 86400000);
    var months = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    var days = ['Domingo','Lunes','Martes','Miercoles','Jueves','Viernes','Sabado'];

    // Set date
    document.getElementById('today-date').textContent = days[today.getDay()] + ', ' + today.getDate() + ' de ' + months[today.getMonth()] + ' ' + today.getFullYear();

    // Moon phase
    var moonPhases = ['\uD83C\uDF11','\uD83C\uDF12','\uD83C\uDF13','\uD83C\uDF14','\uD83C\uDF15','\uD83C\uDF16','\uD83C\uDF17','\uD83C\uDF18'];
    var moonCycle = 29.5;
    var knownNewMoon = new Date(2024, 0, 11);
    var daysSinceNew = (today - knownNewMoon) / 86400000;
    var moonPhaseIdx = Math.floor((daysSinceNew % moonCycle) / moonCycle * 8) % 8;
    var moonNames = ['Luna Nueva','Luna Creciente','Cuarto Creciente','Gibosa Creciente','Luna Llena','Gibosa Menguante','Cuarto Menguante','Luna Menguante'];

      'Energia de transformacion en el aire. ' + moonNames[moonPhaseIdx] + ' te pide soltar lo viejo.',
      'Las relaciones estan favorecidas hoy. ' + moonNames[moonPhaseIdx] + ' ilumina tus conexiones.',

    // Render sign cards
    var grid = document.getElementById('signs-grid');
    signs.forEach(function(s) {
      var card = document.createElement('div');
      card.className = 'sign-card';
      card.onclick = function() { showReading(s); };
      card.innerHTML = '<span class="symbol">' + s.symbol + '</span><span class="name">' + s.name + '</span><div class="dates">' + s.dates + '</div><div class="element">' + s.element + '</div>';

    var currentSign = null;

    function showReading(sign) {
      // Remove active from all cards
      document.querySelectorAll('.sign-card').forEach(function(c) { c.classList.remove('active'); });

      currentSign = sign;
      var h = horoscopes[sign.id];
      var idx = dayOfYear % h.length;
      var reading = h[idx];
      var luckyNum = Math.floor(seededRandom(dayOfYear + sign.id.charCodeAt(0)) * 49) + 1;
      var luckyNum2 = Math.floor(seededRandom(dayOfYear + sign.id.charCodeAt(1) + 100) * 49) + 1;

      var el = document.getElementById('reading');
      el.innerHTML = '<div class="reading-card">' +
        '<div class="header"><div class="big-symbol">' + sign.symbol + '</div>' +

    function submitHoroLead(e) {
      e.preventDefault();
      var btn = document.getElementById('hl-submit');
      var email = document.getElementById('hl-email').value.trim();
      if (!email || !currentSign) return;
      btn.disabled = true;
      btn.textContent = 'Suscribiendo...';
      fetch('/api/quiz-lead', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: '', email: email, moonSign: currentSign.name, source: 'horoscopo-diario' })
      })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        document.querySelector('#horo-lead form').style.display = 'none';
        document.getElementById('hl-success').style.display = 'block';
        if (typeof posthog !== 'undefined') posthog.capture('horoscope_lead_captured', { email: email, sign: currentSign.id });
        if (typeof gtag !== 'undefined') gtag('event', 'generate_lead', { event_category: 'horoscope', event_label: currentSign.id });
      })
      .catch(function(err) {
        btn.disabled = false;
        btn.textContent = '\u2728 Suscribirme gratis';
        alert('Error. Intentalo de nuevo.');
      });
    }

    function shareHoroscope(platform) {
      if (!currentSign) return;
      var text = 'Mi horoscopo de hoy ' + currentSign.symbol + ' ' + currentSign.name + ' \u2728\nVe el tuyo gratis:';
      var url = 'https://astroaureum.com/horoscopo-diario.html';
      var encoded = encodeURIComponent(text + '\n' + url);
      switch (platform) {
        case 'whatsapp': window.open('https://api.whatsapp.com/send?text=' + encoded, '_blank'); break;
        case 'facebook': window.open('https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(url), '_blank'); break;
        case 'twitter': window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(text) + '&url=' + encodeURIComponent(url), '_blank'); break;
        case 'telegram': window.open('https://t.me/share/url?url=' + encodeURIComponent(url) + '&text=' + encodeURIComponent(text), '_blank'); break;
      }
      if (typeof posthog !== 'undefined') posthog.capture('horoscope_shared', { platform: platform, sign: currentSign.id });
    }
