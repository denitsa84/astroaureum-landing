<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Poppins:wght@300;400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #000; }
  .post {
    width: 1080px; height: 1080px;
    background: radial-gradient(ellipse at 50% 50%, rgba(123,79,191,0.2) 0%, transparent 60%),
                radial-gradient(ellipse at 30% 70%, rgba(212,168,67,0.1) 0%, transparent 50%),
                #06050E;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .post::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      radial-gradient(1px 1px at 150px 100px, rgba(255,255,255,0.5), transparent),
      radial-gradient(1.5px 1.5px at 350px 250px, rgba(212,168,67,0.6), transparent),
      radial-gradient(1px 1px at 600px 150px, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 850px 350px, rgba(255,255,255,0.3), transparent),
      radial-gradient(1.5px 1.5px at 200px 500px, rgba(212,168,67,0.4), transparent),
      radial-gradient(1px 1px at 750px 700px, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 500px 850px, rgba(255,255,255,0.3), transparent);
  }
  .moon-icon {
    font-size: 200px; z-index: 1; margin-bottom: 20px;
    filter: drop-shadow(0 0 40px rgba(212,168,67,0.4));
  }
  .question {
    font-family: Cinzel; font-size: 52px; font-weight: 900; color: #F5F0FF;
    text-align: center; z-index: 1; line-height: 1.3;
    max-width: 800px;
  }
  .question span { color: #D4A843; }
  .divider {
    width: 200px; height: 2px; margin: 35px 0;
    background: linear-gradient(90deg, transparent, #D4A843, transparent);
    z-index: 1;
  }
  .desc {
    font-family: Poppins; font-size: 28px; color: #F5F0FF; text-align: center;
    z-index: 1; opacity: 0.8; max-width: 700px; line-height: 1.5;
    margin-bottom: 40px;
  }
  .cta {
    background: linear-gradient(135deg, #D4A843, #F0D78C);
    color: #06050E; font-family: Poppins; font-weight: 700; font-size: 32px;
    padding: 20px 60px; border-radius: 50px; z-index: 1;
    letter-spacing: 2px; text-transform: uppercase;
    box-shadow: 0 0 40px rgba(212,168,67,0.3);
  }
  .free {
    font-family: Poppins; font-size: 24px; color: #A77BDB; margin-top: 20px;
    z-index: 1; font-weight: 600; letter-spacing: 3px;
  }
  .bottom {
    position: absolute; bottom: 40px;
    font-family: Poppins; font-size: 22px; color: rgba(245,240,255,0.5);
    z-index: 1; letter-spacing: 2px;
  }
</style></head>
<body>
  <div class="post">
    <div class="moon-icon">&#x1F319;</div>
    <div class="question">&iquest;Conoces tu <span>SIGNO LUNAR</span>?</div>
    <div class="divider"></div>
    <div class="desc">
      Tu signo lunar revela c&oacute;mo manejas tus emociones,
      qu&eacute; necesitas en el amor y cu&aacute;l es tu verdadero yo interior.
    </div>
    <div class="cta">&#x1F52E; QUIZ GRATIS</div>
    <div class="free">100% GRATIS &bull; 30 SEGUNDOS</div>
    <div class="bottom">astroaureum.com/quiz-lunar</div>
  </div>
</body></html>
