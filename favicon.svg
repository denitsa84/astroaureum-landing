<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="goldG" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FFE88A"/><stop offset="50%" stop-color="#D4A843"/><stop offset="100%" stop-color="#B8882A"/></linearGradient>
    <linearGradient id="purpleG" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#D4B8FF"/><stop offset="100%" stop-color="#8B5CF6"/></linearGradient>
    <radialGradient id="irisG" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FFFDE0"/><stop offset="20%" stop-color="#FFD700"/><stop offset="50%" stop-color="#D4A843"/><stop offset="75%" stop-color="#8B5CF6"/><stop offset="100%" stop-color="#4C1D95"/></radialGradient>
    <radialGradient id="pupilG" cx="42%" cy="40%" r="60%"><stop offset="0%" stop-color="#2D1B69"/><stop offset="100%" stop-color="#0A0814"/></radialGradient>
    <radialGradient id="bgG" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#130F2A"/><stop offset="100%" stop-color="#06050E"/></radialGradient>
    <radialGradient id="auraG" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#D4A843" stop-opacity="0.3"/><stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.1"/><stop offset="100%" stop-color="transparent"/></radialGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="500" rx="80" fill="url(#bgG)"/>
  <!-- Aura glow -->
  <ellipse cx="250" cy="250" rx="220" ry="200" fill="url(#auraG)"/>
  <!-- Upper rays -->
  <g>
    <line x1="250" y1="100" x2="250" y2="28" stroke="#FFD700" stroke-width="4" opacity="0.7"/>
    <line x1="190" y1="118" x2="165" y2="38" stroke="#FFD700" stroke-width="3.5" opacity="0.6"/>
    <line x1="310" y1="118" x2="335" y2="38" stroke="#FFD700" stroke-width="3.5" opacity="0.6"/>
    <line x1="140" y1="152" x2="100" y2="68" stroke="#FFD700" stroke-width="3" opacity="0.5"/>
    <line x1="360" y1="152" x2="400" y2="68" stroke="#FFD700" stroke-width="3" opacity="0.5"/>
    <line x1="100" y1="195" x2="48" y2="115" stroke="#FFD700" stroke-width="2.5" opacity="0.35"/>
    <line x1="400" y1="195" x2="452" y2="115" stroke="#FFD700" stroke-width="2.5" opacity="0.35"/>
  </g>
  <!-- Lower rays -->
  <g>
    <line x1="250" y1="400" x2="250" y2="472" stroke="#FFD700" stroke-width="4" opacity="0.7"/>
    <line x1="190" y1="382" x2="165" y2="462" stroke="#FFD700" stroke-width="3.5" opacity="0.6"/>
    <line x1="310" y1="382" x2="335" y2="462" stroke="#FFD700" stroke-width="3.5" opacity="0.6"/>
    <line x1="140" y1="348" x2="100" y2="432" stroke="#FFD700" stroke-width="3" opacity="0.5"/>
    <line x1="360" y1="348" x2="400" y2="432" stroke="#FFD700" stroke-width="3" opacity="0.5"/>
    <line x1="100" y1="305" x2="48" y2="385" stroke="#FFD700" stroke-width="2.5" opacity="0.35"/>
    <line x1="400" y1="305" x2="452" y2="385" stroke="#FFD700" stroke-width="2.5" opacity="0.35"/>
  </g>
  <!-- Crescent moons -->
  <path d="M35,190 Q5,250 35,310 Q60,270 60,250 Q60,230 35,190Z" fill="url(#purpleG)" opacity="0.9"/>
  <path d="M465,190 Q495,250 465,310 Q440,270 440,250 Q440,230 465,190Z" fill="url(#purpleG)" opacity="0.9"/>
  <!-- Eye shape glow -->
  <path d="M60,250 Q155,110 250,90 Q345,110 440,250 Q345,390 250,410 Q155,390 60,250Z" fill="rgba(212,168,67,0.08)" stroke="#FFD700" stroke-width="2" opacity="0.3"/>
  <!-- Eye shape -->
  <path d="M60,250 Q155,110 250,90 Q345,110 440,250 Q345,390 250,410 Q155,390 60,250Z" fill="rgba(212,168,67,0.06)" stroke="url(#goldG)" stroke-width="4"/>
  <!-- Iris outer glow -->
  <circle cx="250" cy="250" r="82" fill="none" stroke="#D4A843" stroke-width="1.5" opacity="0.25"/>
  <!-- Iris -->
  <circle cx="250" cy="250" r="76" fill="url(#irisG)" opacity="0.55" stroke="url(#goldG)" stroke-width="3"/>
  <!-- Iris inner ring -->
  <circle cx="250" cy="250" r="52" fill="none" stroke="#D4A843" stroke-width="2" opacity="0.5"/>
  <!-- Iris detail lines -->
  <g opacity="0.35" stroke="#FFD700" stroke-width="1.5">
    <line x1="250" y1="176" x2="250" y2="200"/>
    <line x1="250" y1="300" x2="250" y2="324"/>
    <line x1="176" y1="250" x2="200" y2="250"/>
    <line x1="300" y1="250" x2="324" y2="250"/>
    <line x1="196" y1="196" x2="214" y2="214"/>
    <line x1="304" y1="196" x2="286" y2="214"/>
    <line x1="196" y1="304" x2="214" y2="286"/>
    <line x1="304" y1="304" x2="286" y2="286"/>
  </g>
  <!-- Pupil -->
  <circle cx="250" cy="250" r="36" fill="url(#pupilG)"/>
  <circle cx="250" cy="250" r="36" stroke="#8B5CF6" stroke-width="2.5" fill="none" opacity="0.45"/>
  <!-- Star in pupil -->
  <path d="M250,220 L255,242 L276,250 L255,258 L250,280 L245,258 L224,250 L245,242Z" fill="#FFD700" opacity="0.75"/>
  <!-- Highlights -->
  <circle cx="232" cy="232" r="12" fill="white" opacity="0.35"/>
  <circle cx="230" cy="230" r="6" fill="white" opacity="0.65"/>
  <circle cx="270" cy="262" r="5" fill="#FFD700" opacity="0.4"/>
  <!-- Corner stars -->
  <g font-family="serif">
    <text x="28" y="48" fill="#FFD700" font-size="22" opacity="0.6">✦</text>
    <text x="450" y="48" fill="#8B5CF6" font-size="18" opacity="0.5">✦</text>
    <text x="452" y="478" fill="#FFD700" font-size="16" opacity="0.45">✦</text>
    <text x="30" y="478" fill="#8B5CF6" font-size="13" opacity="0.35">✦</text>
  </g>
</svg>
