  <style>
/* ══════════════════════════════════════════════════════
   ASTRO CONNECT — Celestial Luxury Dark Theme
   ══════════════════════════════════════════════════════ */

:root {
  --bg: #06050E;
  --surface: rgba(15,13,30,0.95);
  --card: rgba(18,16,36,0.85);
  --gold: #D4A843;
  --gold-light: #F0CC6B;
  --purple: #7B4FBF;
  --purple-light: #9B6FDF;
  --text: #EDE8F5;
  --text-dim: #8E84A6;
  --text-muted: #6B6280;
  --border: rgba(212,168,67,0.12);
  --radius: 16px;
  --sidebar-width: 260px;
}

/* === RESET === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html {
  scroll-behavior: smooth;
  -webkit-text-size-adjust: 100%;
  -ms-text-size-adjust: 100%;
  text-size-adjust: 100%;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Philosopher', 'Noto Sans', sans-serif;
  line-height: 1.6;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  min-height: 100dvh;
  width: 100%;
}

/* === CANVAS STARS === */
#stars {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  z-index: 0;
  pointer-events: none;
}

/* === PARTICLES === */
.particle {
  position: fixed;
  border-radius: 50%;
  opacity: 0;
  pointer-events: none;
  z-index: 1;
  animation: floatUp linear infinite;
}
@keyframes floatUp {
  0% { bottom: -10%; opacity: 0; }
  50% { opacity: 0.6; }
  100% { bottom: 110%; opacity: 0; }
}

/* === SIDEBAR === */
.sidebar {
  position: fixed;
  left: 0; top: 0;
  width: var(--sidebar-width);
  height: 100vh;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 100;
  overflow-y: auto;
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: rgba(212,168,67,0.4); border-radius: 3px; }

.sidebar-logo {
  font-family: 'Cinzel', serif;
  font-size: 1.3rem;
  text-align: center;
  color: var(--gold);
  padding: 24px 16px 4px;
}
.logo-eye {
  display: inline-block;
  width: 44px;
  height: 44px;
  margin: 0 auto 8px;
  position: relative;
  filter: drop-shadow(0 0 12px rgba(255,215,0,0.3));
}
.logo-eye img { width: 100%; height: 100%; object-fit: contain; }
@keyframes logoSpin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
@keyframes pupilGlow {
  0%, 100% { r: 4; fill: #D4A843; }
  50% { r: 5; fill: #F0CC6B; }
}
@keyframes irisRotate {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
.sidebar-sub {
  text-align: center;
  font-size: 0.6rem;
  color: var(--text-dim);
  margin-bottom: 8px;
}
.lang-select {
  margin: 8px 16px 16px;
  background: transparent;
  border: 1px solid rgba(212,168,67,0.2);
  color: var(--gold);
  border-radius: 8px;
  padding: 6px 10px;
  font-size: 0.75rem;
  font-family: inherit;
  cursor: pointer;
}
.lang-select option { background: #0f0d1e; color: var(--text); }
.sidebar-cats { flex: 1; overflow-y: auto; padding: 4px 8px; }
.sidebar-cats::-webkit-scrollbar { width: 3px; }
.sidebar-cats::-webkit-scrollbar-track { background: transparent; }
.sidebar-cats::-webkit-scrollbar-thumb { background: rgba(212,168,67,0.3); border-radius: 3px; }

.sidebar-cat { margin-bottom: 4px; }
.sidebar-cat-head {
  padding: 8px 12px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.72rem;
  color: var(--text-dim);
  transition: color 0.2s;
  user-select: none;
}
.sidebar-cat-head:hover { color: var(--gold); }
.sidebar-cat-head::after { content: "▸"; transition: transform 0.3s; font-size: 0.6rem; }
.sidebar-cat-head.open::after { transform: rotate(90deg); }
.sidebar-cat-items {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}
.sidebar-cat-items.open { max-height: 600px; }
.sidebar-item {
  padding: 6px 12px 6px 24px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  font-size: 0.68rem;
  color: var(--text-muted);
  border-radius: 6px;
  transition: all 0.2s;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.sidebar-item:hover { background: rgba(212,168,67,0.06); color: var(--text); }
.sidebar-item.active { background: rgba(212,168,67,0.1); color: var(--gold); }
.sidebar-footer {
  padding: 16px;
  text-align: center;
  font-size: 0.55rem;
  color: var(--text-muted);
  border-top: 1px solid var(--border);
}
.sidebar-footer a {
  color: var(--text-dim);
  text-decoration: none;
  margin: 0 6px;
  transition: color 0.2s;
}
.sidebar-footer a:hover { color: var(--gold); }

/* === HAMBURGER & MOBILE OVERLAY === */
.hamburger {
  display: none;
  position: fixed;
  top: 16px; left: 16px;
  z-index: 200;
  background: var(--surface);
  border: 1px solid rgba(212,168,67,0.2);
  color: var(--gold);
  font-size: 1.3rem;
  cursor: pointer;
  border-radius: 10px;
  width: 44px; height: 44px;
  align-items: center;
  justify-content: center;
}
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 90;
}

/* === MAIN CONTENT === */
.main-content {
  margin-left: var(--sidebar-width);
  position: relative;
  z-index: 50;
  min-height: 100vh;
}

/* === SECTIONS === */
.section {
  max-width: 1200px;
  margin: 0 auto;
  padding: 80px 40px;
}
.section-title {
  font-family: 'Cinzel', serif;
  font-size: 2.4rem;
  text-align: center;
  color: var(--gold);
  margin-bottom: 16px;
}
.section-sub {
  text-align: center;

/* === HERO === */
.hero {
  min-height: 80vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 120px 40px 80px;
  position: relative;
}
.cosmic-eye-container {
  width: 220px; height: 220px;
  margin-bottom: 24px;
  position: relative;
  filter: drop-shadow(0 0 15px rgba(255,215,0,0.3));
  animation: eyeFloat 8s ease-in-out infinite;
}
@keyframes eyeFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
.cosmic-eye-container img { width: 100%; height: 100%; object-fit: contain; border-radius: 50%; }
.cosmic-eye-ring { position: absolute; inset: -15px; border: 1px solid rgba(212,168,67,0.12); border-radius: 50%; animation: ringSpin 20s linear infinite; }
.cosmic-eye-ring::after { content: '✦'; position: absolute; top: -5px; left: 50%; transform: translateX(-50%); color: var(--gold); font-size: 10px; opacity: 0.6; }
.cosmic-eye-ring2 { position: absolute; inset: -30px; border: 1px dashed rgba(123,79,191,0.1); border-radius: 50%; animation: ringSpin 30s linear infinite reverse; }
@keyframes eyeFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
@keyframes cosmicSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
@keyframes ringSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(212,168,67,0.08);
  border: 1px solid rgba(212,168,67,0.2);
  border-radius: 50px;
  padding: 8px 20px;
  font-size: 0.75rem;
  color: var(--gold);
  margin-bottom: 32px;
  animation: fadeDown 1s ease both;
}
.pulse-dot {
  width: 8px; height: 8px;
  background: var(--gold);
  border-radius: 50%;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.5); }
}
.hero-title {
  font-family: 'Cinzel', serif;
  font-size: 2.8rem;
  line-height: 1.2;
  margin-bottom: 16px;
  background: linear-gradient(135deg, var(--gold), var(--gold-light), var(--purple-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: fadeUp 1s ease both;
  max-width: 700px;
}
.hero-hook-sub {
  font-size: 1.15rem;
  color: var(--text);
  max-width: 540px;
  margin-bottom: 28px;
  animation: fadeUp 1s 0.2s ease both;
  line-height: 1.6;
}
.hero-sub-small {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-top: 8px;
  margin-bottom: 16px;
  animation: fadeUp 1s 0.6s ease both;
  letter-spacing: 1px;
}
.hero-desc {
  font-size: 1rem;
  color: var(--text-dim);
  max-width: 600px;
  margin-bottom: 32px;
  animation: fadeUp 1s 0.4s ease both;
}
/* Hero big CTA override */
.hero-mega-cta--big { max-width: 620px; padding: 36px 40px; }
.hero-mega-cta--big .cta-btn--hero {
  padding: 18px 36px;
  font-size: 1.15rem;
  letter-spacing: 0.5px;
  animation: ctaPulse 2.5s ease-in-out infinite;
}
@keyframes ctaPulse {
  0%, 100% { box-shadow: 0 4px 20px rgba(212,168,67,0.3); }
  50% { box-shadow: 0 8px 40px rgba(212,168,67,0.55), 0 0 60px rgba(212,168,67,0.15); }
}
/* === MEGA CTA === */
.hero-mega-cta {
  width: 100%;
  max-width: 560px;
  margin: 0 auto 36px;
  padding: 32px 36px;
  background: linear-gradient(135deg, rgba(212,168,67,0.08), rgba(123,79,191,0.08));
  border: 2px solid rgba(212,168,67,0.25);

  animation: fadeUp 0.8s 0.5s ease both, ctaGlow 3s ease-in-out infinite;

}
.hero-mega-cta::before {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 26px;
  background: linear-gradient(135deg, var(--gold), var(--purple), var(--gold));
  z-index: -1;
  opacity: 0.15;
  filter: blur(8px);
}
@keyframes ctaGlow {
  0%, 100% { box-shadow: 0 0 20px rgba(212,168,67,0.1), 0 0 60px rgba(123,79,191,0.05); }
  50% { box-shadow: 0 0 30px rgba(212,168,67,0.25), 0 0 80px rgba(123,79,191,0.1); }
}
.hero-mega-cta h3 {
  font-family: 'Cinzel', serif;
  font-size: 1.4rem;
  color: var(--gold);
  margin-bottom: 6px;
}
.hero-mega-cta .cta-hint {
  font-size: 0.85rem;
  color: var(--text-dim);
  margin-bottom: 18px;
}
.hero-mega-cta .cta-row {
  display: flex;
  gap: 12px;
  align-items: stretch;
}
.hero-mega-cta .cta-input {
  flex: 1;
  padding: 16px 18px;
  background: rgba(255,255,255,0.06);

}
.hero-mega-cta .cta-input:focus { border-color: var(--gold); }

.hero-mega-cta .cta-btn {
  padding: 16px 28px;

.hero-mega-cta .cta-free {

}
@media (max-width: 600px) {

  .hero-mega-cta .cta-row { flex-direction: column; }
  .hero-mega-cta .cta-btn { width: 100%; padding: 16px; }
}
.hero-btns {

}
.btn-gold {

/* === TRADITION CARDS === */
.trad-grid {

/* === CONCERN SELECTOR === */

.concern-reco-product { display: flex; align-items: center; gap: 10px; padding: 14px 16px; background: rgba(212,168,67,0.05); border: 1px solid rgba(212,168,67,0.15); border-radius: 12px; cursor: pointer; transition: all 0.2s; text-decoration: none; color: var(--text); }

/* === CONCERN CONTACT FORM === */

.concern-form-modal { background: linear-gradient(135deg, #0D0B18, #1A1530); border: 1px solid rgba(212,168,67,0.2); border-radius: 20px; padding: 40px; max-width: 480px; width: 92%; max-height: 90vh; overflow-y: auto; position: relative; animation: modalIn 0.3s ease; }

/* === PRODUCT SECTIONS === */

}

/* === FAQ === */

/* === LEGAL MODAL === */
.legal-overlay {
  position: fixed; inset: 0;
  background: rgba(6,5,14,0.95);

}

}

/* === MODAL === */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 40px;
  max-width: 520px;
  width: 90%;
  max-height: 85vh;
  overflow-y: auto;
  position: relative;
  animation: modalIn 0.3s ease;
}
.modal::-webkit-scrollbar { width: 3px; }
.modal::-webkit-scrollbar-track { background: transparent; }
.modal::-webkit-scrollbar-thumb { background: rgba(212,168,67,0.4); border-radius: 3px; }

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95) translateY(20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-close {
  position: absolute;
  top: 16px; right: 16px;
  background: none;
  border: none;
  color: var(--gold);
  font-size: 1.2rem;
  cursor: pointer;
}
.modal h2 {

  font-size: 1.3rem;

}
.modal-field { margin-bottom: 16px; }

  display: block;
  font-size: 0.72rem;

  margin-bottom: 4px;
}
.modal-field input,
.modal-field select,
.modal-field textarea {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  color: var(--text);
  font-size: 0.82rem;
  font-family: inherit;
  transition: border-color 0.2s;
  outline: none;
}
.modal-field input:focus,
.modal-field select:focus,
.modal-field textarea:focus {
  border-color: rgba(212,168,67,0.5);
}
.modal-divider {

  font-size: 0.72rem;
  color: var(--text-dim);
  margin: 24px 0 16px;
  position: relative;
}
.modal-divider::before,
.modal-divider::after {
  content: '';
  position: absolute;
  top: 50%;
  width: calc(50% - 70px);
  height: 1px;
  background: var(--border);
}
.modal-divider::before { left: 0; }
.modal-divider::after { right: 0; }
.modal-submit {
  width: 100%;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  color: #06050E;
  font-weight: 700;
  padding: 14px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-size: 0.9rem;
  font-family: inherit;
  margin-top: 8px;
  transition: all 0.3s;
}
.modal-submit:hover { transform: scale(1.02); box-shadow: 0 8px 24px rgba(212,168,67,0.3); }

function psychoRound(amount, code) {
  if (code === 'VND') return Math.round(amount / 10000) * 10000;
  if (code === 'IDR') return Math.round(amount / 5000) * 5000;
  if (code === 'KRW') return Math.round(amount / 1000) * 1000;
  if (code === 'HUF') return Math.round(amount / 100) * 100;
  if (code === 'JPY') return Math.round(amount / 100) * 100;
  if (amount > 50) { var f = Math.floor(amount); return f - (f % 10) + 9; }
  if (amount > 10) { var f2 = Math.floor(amount); return f2 - (f2 % 5) + 4.90; }
  return Math.round(amount * 10) / 10;
}

function calcLocalPrice(eurWholeUnits) {
  var mult = PRICING_TIERS[currentPricing.tier];
  var rate = FX_RATES[currentPricing.currencyCode] || 1;
  return psychoRound(eurWholeUnits * mult * rate, currentPricing.currencyCode);
}

function fmtPrice(amount) {
  var cur = CURRENCIES[currentPricing.currencyCode] || CURRENCIES.EUR;

  if (cur.zd || amount === Math.floor(amount)) {

  } else {
    s = amount.toFixed(2);
  }
  return cur.pos === 'before' ? cur.sym + s : s + ' ' + cur.sym;
}

  return '<div class="tier-selector">' +
    '<div class="tier-option active" data-tier="basic" onclick="selectTier(this,\'basic\')">' +
      '<div class="tier-badge">' + tBasic + '</div>' +
      '<div class="tier-price">' + basicAmt + '</div>' +
      '<div class="tier-desc">' + tBasicDesc + '</div>' +
    '</div>' +
    '<div class="tier-option" data-tier="premium" onclick="selectTier(this,\'premium\')">' +
      '<div class="tier-badge gold">' + tPremium + '</div>' +
      '<div class="tier-price">' + premiumAmt + '</div>' +
      '<div class="tier-desc">' + tPremiumDesc + '</div>' +
    '</div>' +
  '</div>';
}

function selectTier(el, tier) {
  currentServiceTier = tier;
  var selector = el.closest('.tier-selector');
  selector.querySelectorAll('.tier-option').forEach(function(opt) { opt.classList.remove('active'); });
  el.classList.add('active');
  // Update prices in the modal
  var modal = document.getElementById('modal');
  var submitBtn = modal.querySelector('.modal-submit');
  var h2 = modal.querySelector('h2');
  var prodId = modal.querySelector('form').getAttribute('onsubmit').match(/'([^']+)'/)[1];
  var prod = findProduct(prodId);
  var pack = findPack(prodId);
  if (pack) {
    var price = fmtTierPackPrice(pack);
    if (h2) h2.innerHTML = '✦ ' + ct(pack.name) + ' — ' + price;
    if (submitBtn) submitBtn.textContent = (t('fSubmit') || 'Pedir lectura') + ' — ' + price;
  } else if (prod) {
    var price2 = fmtTierPrice(prod);
    if (h2) h2.innerHTML = '✦ ' + ct(prod.name) + ' — ' + price2;
    if (submitBtn) submitBtn.textContent = (t('fSubmit') || 'Pedir lectura') + ' — ' + price2;
  }
}

function fetchServerPricing() {
  fetch('/api/pricing?lang=' + currentLocale)
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.tier && data.currency) {
        try { sessionStorage.setItem('ac_geo_pricing', JSON.stringify({ tier: data.tier, currency: data.currency })); } catch(e) {}
        currentPricing.tier = data.tier;
        currentPricing.currencyCode = data.currency;
        renderAll();
      }
    })
    .catch(function() {
      // Server unreachable — client-side locale estimate is already showing
    });
}

var fd={bg:'Четенията на Astro Aureum се генерират чрез напреднала технология за астрологичен анализ. Всяко четене се изчислява индивидуално. Четенията са ориентировъчни и допълнителни. Не заместват професионалния медицински, психологически или финансов съвет.',fr:'Les lectures d\'Astro Aureum sont générées par une technologie avancée d\'analyse astrologique. Chaque lecture est calculée individuellement. Les lectures sont indicatives et complémentaires. Elles ne remplacent pas les conseils médicaux, psychologiques ou financiers professionnels.',de:'Die Deutungen von Astro Aureum werden mit fortschrittlicher astrologischer Analysetechnologie erstellt. Jede Deutung wird individuell berechnet. Die Deutungen sind orientierend und ergänzend. Sie ersetzen keine professionelle medizinische, psychologische oder finanzielle Beratung.',it:'Le letture di Astro Aureum sono generate mediante tecnologia avanzata di analisi astrologica. Ogni lettura è calcolata individualmente. Le letture sono orientative e complementari. Non sostituiscono il consiglio medico, psicologico o finanziario professionale.',pt:'As leituras do Astro Aureum são geradas por tecnologia avançada de análise astrológica. Cada leitura é calculada individualmente. As leituras são orientativas e complementares. Não substituem o aconselhamento médico, psicológico ou financeiro profissional.',ru:'Чтения Astro Aureum генерируются с помощью передовой технологии астрологического анализа. Каждое чтение рассчитывается индивидуально. Чтения являются ориентировочными и дополнительными. Они не заменяют профессиональные медицинские, психологические или финансовые консультации.',zh:'Astro Aureum的解读通过先进的占星分析技术生成。每次解读都是个别计算的。解读具有指导性和补充性，不能替代专业的医疗、心理或财务建议。',ja:'Astro Aureumのリーディングは先進的な占星分析技術で生成されます。各リーディングは個別に計算されます。リーディングは参考であり補完的です。専門的な医療、心理、財務アドバイスに代わるものではありません。',ko:'Astro Aureum 리딩은 첨단 점성술 분석 기술로 생성됩니다. 각 리딩은 개별적으로 계산됩니다. 리딩은 참고용이며 보완적입니다. 전문적인 의료, 심리 또는 재정적 조언을 대체하지 않습니다.',ar:'قراءات Astro Aureum تُنشأ بتقنية تحليل فلكي متقدمة. كل قراءة تُحسب فردياً. القراءات إرشادية وتكميلية. لا تحل محل الاستشارات الطبية أو النفسية أو المالية المهنية.',hi:'Astro Aureum रीडिंग उन्नत ज्योतिषीय विश्लेषण प्रौद्योगिकी से उत्पन्न होती हैं। प्रत्येक रीडिंग व्यक्तिगत रूप से गणना की जाती है। रीडिंग मार्गदर्शक और पूरक हैं। ये पेशेवर चिकित्सा, मनोवैज्ञानिक या वित्तीय सलाह का विकल्प नहीं हैं।',tr:'Astro Aureum okumaları gelişmiş astrolojik analiz teknolojisiyle oluşturulur. Her okuma bireysel olarak hesaplanır. Okumalar yönlendirici ve tamamlayıcıdır. Profesyonel tıbbi, psikolojik veya mali tavsiyenin yerini almaz.',nl:'De lezingen van Astro Aureum worden gegenereerd met geavanceerde astrologische analysetechnologie. Elke lezing wordt individueel berekend. Lezingen zijn indicatief en aanvullend. Ze vervangen geen professioneel medisch, psychologisch of financieel advies.',sv:'Astro Aureums tolkningar genereras med avancerad astrologisk analysteknik. Varje tolkning beräknas individuellt. Tolkningarna är vägledande och kompletterande. De ersätter inte professionell medicinsk, psykologisk eller ekonomisk rådgivning.',pl:'Odczyty Astro Aureum generowane są zaawansowaną technologią analizy astrologicznej. Każdy odczyt jest obliczany indywidualnie. Odczyty mają charakter orientacyjny i uzupełniający. Nie zastępują profesjonalnej porady medycznej, psychologicznej ani finansowej.',ro:'Lecturile Astro Aureum sunt generate prin tehnologie avansată de analiză astrologică. Fiecare lectură este calculată individual. Lecturile sunt orientative și complementare. Nu înlocuiesc sfatul medical, psihologic sau financiar profesional.',el:'Οι αναγνώσεις Astro Aureum δημιουργούνται με προηγμένη τεχνολογία αστρολογικής ανάλυσης. Κάθε ανάγνωση υπολογίζεται ατομικά. Οι αναγνώσεις είναι ενδεικτικές και συμπληρωματικές. Δεν αντικαθιστούν επαγγελματικές ιατρικές, ψυχολογικές ή οικονομικές συμβουλές.',th:'การอ่านของ Astro Aureum สร้างขึ้นด้วยเทคโนโลยีการวิเคราะห์โหราศาสตร์ขั้นสูง แต่ละการอ่านคำนวณเป็นรายบุคคล การอ่านเป็นแนวทางและเสริม ไม่ได้แทนที่คำแนะนำทางการแพทย์ จิตวิทยา หรือการเงินจากผู้เชี่ยวชาญ',vi:'Các bài đọc Astro Aureum được tạo bằng công nghệ phân tích chiêm tinh tiên tiến. Mỗi bài đọc được tính toán riêng lẻ. Các bài đọc mang tính định hướng và bổ sung. Không thay thế lời khuyên y tế, tâm lý hoặc tài chính chuyên nghiệp.',id:'Pembacaan Astro Aureum dihasilkan dengan teknologi analisis astrologi tingkat lanjut. Setiap pembacaan dihitung secara individual. Pembacaan bersifat indikatif dan pelengkap. Tidak menggantikan saran medis, psikologis atau finansial profesional.',he:'קריאות Astro Aureum מופקות באמצעות טכנולוגיית ניתוח אסטרולוגי מתקדמת. כל קריאה מחושבת באופן אישי. הקריאות הן מנחות ומשלימות. אינן מחליפות ייעוץ רפואי, פסיכולוגי או פיננסי מקצועי.',uk:'Читання Astro Aureum генеруються за допомогою передової технології астрологічного аналізу. Кожне читання обчислюється індивідуально. Читання є орієнтовними та доповнювальними. Вони не замінюють професійну медичну, психологічну чи фінансову консультацію.',cs:'Čtení Astro Aureum jsou generována pokročilou technologií astrologické analýzy. Každé čtení je vypočítáno individuálně. Čtení jsou orientační a doplňková. Nenahrazují odborné lékařské, psychologické ani finanční poradenství.'};

var md={bg:'⚕️ Важно: Медицинската астрология е хилядолетна традиция, изучаваща съответствията между планетите и функциите на тялото. Това четене предлага насоки за конституционални тенденции, благосъстояние и здравословни рутини. НЕ е медицинска диагноза, НЕ замества консултация с лекар и НЕ препоръчва лечения или медикаменти. При здравословни проблеми винаги се консултирайте с лекар.',fr:'⚕️ Avis important : L\'Astrologie Médicale est une tradition millénaire qui étudie les correspondances entre les planètes et les fonctions du corps. Cette lecture offre des orientations sur les tendances constitutionnelles, le bien-être et les routines de santé. Ce N\'EST PAS un diagnostic médical, NE remplace PAS la consultation d\'un médecin qualifié et NE recommande PAS de traitements médicaux ni de médicaments. En cas de problèmes de santé, consultez toujours votre médecin.',de:'⚕️ Wichtiger Hinweis: Die Medizinische Astrologie ist eine jahrtausendealte Tradition, die die Entsprechungen zwischen Planeten und Körperfunktionen untersucht. Diese Deutung bietet Orientierung zu konstitutionellen Tendenzen, Wohlbefinden und Gesundheitsroutinen. Sie ist KEINE medizinische Diagnose, ersetzt NICHT die Konsultation eines Arztes und empfiehlt KEINE medizinischen Behandlungen oder Medikamente. Bei gesundheitlichen Bedenken konsultieren Sie immer Ihren Arzt.',it:'⚕️ Avviso importante: L\'Astrologia Medica è una tradizione millenaria che studia le corrispondenze tra pianeti e funzioni del corpo. Questa lettura offre orientamento su tendenze costituzionali, benessere e routine di salute. NON è una diagnosi medica, NON sostituisce la consulenza di un medico qualificato e NON raccomanda trattamenti medici o farmaci. Per problemi di salute, consulta sempre il tuo medico.',pt:'⚕️ Aviso importante: A Astrologia Medicinal é uma tradição milenar que estuda as correspondências entre planetas e funções do corpo. Esta leitura oferece orientação sobre tendências constitucionais, bem-estar e rotinas de saúde. NÃO é um diagnóstico médico, NÃO substitui a consulta com um médico qualificado e NÃO recomenda tratamentos médicos ou medicamentos. Se tiver preocupações de saúde, consulte sempre o seu médico.',ru:'⚕️ Важно: Медицинская астрология — тысячелетняя традиция, изучающая соответствия между планетами и функциями тела. Это чтение предлагает ориентиры по конституциональным тенденциям, благополучию и здоровым привычкам. Это НЕ медицинский диагноз, НЕ заменяет консультацию врача и НЕ рекомендует лечение или лекарства. При проблемах со здоровьем всегда обращайтесь к врачу.',zh:'⚕️ 重要提示：医学占星术是一门研究行星与身体功能对应关系的千年传统。本解读提供体质倾向、养生和健康习惯方面的指导。它不是医学诊断，不能替代合格医生的咨询，也不推荐医疗方案或药物。如有健康问题，请务必咨询医生。',ja:'⚕️ 重要なお知らせ：医学占星術は、惑星と身体機能の対応関係を研究する千年の伝統です。このリーディングは体質傾向、健康、生活習慣についてのガイダンスを提供します。医学的診断ではなく、医師の診察に代わるものではなく、医療処置や薬を推奨するものではありません。健康上の懸念がある場合は、必ず医師にご相談ください。',ko:'⚕️ 중요 안내: 의학 점성술은 행성과 신체 기능의 대응 관계를 연구하는 천년 전통입니다. 이 리딩은 체질적 경향, 건강 및 건강 습관에 대한 안내를 제공합니다. 이것은 의학적 진단이 아니며, 의사 상담을 대체하지 않으며, 의료 치료나 약물을 권장하지 않습니다. 건강 문제가 있으면 반드시 의사와 상담하세요.',ar:'⚕️ تنبيه مهم: التنجيم الطبي تقليد عريق يدرس التوافقات بين الكواكب ووظائف الجسم. هذه القراءة تقدم توجيهات حول الميول الدستورية والعافية وعادات الصحة. ليست تشخيصاً طبياً، ولا تحل محل استشارة طبيب مؤهل، ولا توصي بعلاجات طبية أو أدوية. إذا كانت لديك مخاوف صحية، استشر طبيبك دائماً.',hi:'⚕️ महत्वपूर्ण सूचना: चिकित्सा ज्योतिष एक प्राचीन परंपरा है जो ग्रहों और शरीर के कार्यों के बीच संबंधों का अध्ययन करती है। यह रीडिंग संवैधानिक प्रवृत्तियों, कल्याण और स्वास्थ्य दिनचर्या पर मार्गदर्शन प्रदान करती है। यह चिकित्सा निदान नहीं है, डॉक्टर की सलाह का विकल्प नहीं है, और चिकित्सा उपचार या दवाओं की सिफारिश नहीं करती। स्वास्थ्य संबंधी चिंताओं के लिए हमेशा अपने चिकित्सक से परामर्श करें।',tr:'⚕️ Önemli uyarı: Tıbbi Astroloji, gezegenlerin vücut fonksiyonlarıyla ilişkisini inceleyen kadim bir gelenektir. Bu okuma, anayasal eğilimler, sağlık ve yaşam rutinleri hakkında rehberlik sunar. Tıbbi teşhis DEĞİLDİR, doktor muayenesinin yerini ALMAZ ve tıbbi tedavi veya ilaç ÖNERMEZdir. Sağlık endişeleriniz varsa her zaman doktorunuza danışın.',nl:'⚕️ Belangrijk: Medische Astrologie is een eeuwenoude traditie die de overeenkomsten tussen planeten en lichaamsfuncties bestudeert. Deze lezing biedt begeleiding over constitutionele neigingen, welzijn en gezondheidsroutines. Het is GEEN medische diagnose, vervangt GEEN consultatie met een arts en beveelt GEEN medische behandelingen of medicijnen aan. Bij gezondheidsproblemen, raadpleeg altijd uw arts.',sv:'⚕️ Viktigt: Medicinsk Astrologi är en tusenårig tradition som studerar sambanden mellan planeter och kroppsfunktioner. Denna tolkning ger vägledning om konstitutionella tendenser, välmående och hälsorutiner. Det är INTE en medicinsk diagnos, ersätter INTE läkarkonsultation och rekommenderar INTE medicinska behandlingar eller läkemedel. Vid hälsoproblem, kontakta alltid din läkare.',pl:'⚕️ Ważne: Astrologia Medyczna to tysiącletnia tradycja badająca związki między planetami a funkcjami ciała. Ten odczyt oferuje wskazówki dotyczące tendencji konstytucyjnych, dobrostanu i rutyn zdrowotnych. NIE jest diagnozą medyczną, NIE zastępuje konsultacji z lekarzem i NIE zaleca leczenia ani leków. W przypadku problemów zdrowotnych zawsze skonsultuj się z lekarzem.',ro:'⚕️ Aviz important: Astrologia Medicală este o tradiție milenară care studiază corespondențele dintre planete și funcțiile corpului. Această lectură oferă orientare privind tendințele constituționale, bunăstarea și rutinele de sănătate. NU este un diagnostic medical, NU înlocuiește consultația unui medic calificat și NU recomandă tratamente medicale sau medicamente. Pentru probleme de sănătate, consultați întotdeauna medicul.',el:'⚕️ Σημαντικό: Η Ιατρική Αστρολογία είναι μια χιλιετής παράδοση που μελετά τις αντιστοιχίες μεταξύ πλανητών και σωματικών λειτουργιών. Αυτή η ανάγνωση προσφέρει καθοδήγηση για συνταγματικές τάσεις, ευεξία και ρουτίνες υγείας. ΔΕΝ είναι ιατρική διάγνωση, ΔΕΝ αντικαθιστά την επίσκεψη σε γιατρό και ΔΕΝ συνιστά θεραπείες ή φάρμακα. Για προβλήματα υγείας, συμβουλευτείτε πάντα τον γιατρό σας.',th:'⚕️ สำคัญ: โหราศาสตร์การแพทย์เป็นประเพณีโบราณที่ศึกษาความสัมพันธ์ระหว่างดาวเคราะห์กับการทำงานของร่างกาย การอ่านนี้ให้คำแนะนำเกี่ยวกับแนวโน้มร่างกาย สุขภาวะ และกิจวัตรสุขภาพ ไม่ใช่การวินิจฉัยทางการแพทย์ ไม่ได้แทนที่การปรึกษาแพทย์ และไม่แนะนำการรักษาหรือยา หากมีปัญหาสุขภาพ ปรึกษาแพทย์เสมอ',vi:'⚕️ Lưu ý quan trọng: Chiêm tinh Y học là truyền thống ngàn năm nghiên cứu sự tương ứng giữa hành tinh và chức năng cơ thể. Bài đọc này cung cấp hướng dẫn về xu hướng thể chất, sức khỏe và thói quen lành mạnh. Đây KHÔNG phải chẩn đoán y khoa, KHÔNG thay thế tư vấn bác sĩ và KHÔNG khuyến nghị điều trị hay thuốc. Nếu có vấn đề sức khỏe, hãy luôn tham khảo bác sĩ.',id:'⚕️ Penting: Astrologi Medis adalah tradisi kuno yang mempelajari korespondensi antara planet dan fungsi tubuh. Pembacaan ini menawarkan panduan tentang kecenderungan konstitusional, kesejahteraan dan rutinitas kesehatan. Ini BUKAN diagnosis medis, TIDAK menggantikan konsultasi dokter dan TIDAK merekomendasikan perawatan medis atau obat-obatan. Jika ada masalah kesehatan, selalu konsultasikan dengan dokter.',he:'⚕️ הודעה חשובה: אסטרולוגיה רפואית היא מסורת עתיקה החוקרת את ההתאמות בין כוכבי הלכת ותפקודי הגוף. קריאה זו מציעה הכוונה לגבי נטיות חוקתיות, רווחה והרגלי בריאות. זו אינה אבחנה רפואית, אינה מחליפה התייעצות עם רופא ואינה ממליצה על טיפולים רפואיים או תרופות. בבעיות בריאות, פנו תמיד לרופא.',uk:'⚕️ Важливо: Медична астрологія — тисячолітня традиція, що вивчає відповідності між планетами та функціями тіла. Це читання пропонує орієнтири щодо конституційних тенденцій, благополуччя та здорових звичок. Це НЕ медичний діагноз, НЕ замінює консультацію лікаря і НЕ рекомендує лікування чи ліки. При проблемах зі здоров\'ям завжди звертайтесь до лікаря.',cs:'⚕️ Důležité: Lékařská astrologie je tisíciletá tradice studující souvislosti mezi planetami a funkcemi těla. Toto čtení nabízí orientaci ohledně konstitučních tendencí, pohody a zdravotních návyků. NENÍ to lékařská diagnóza, NENAHRAZUJE konzultaci s lékařem a NEDOPORUČUJE léčbu ani léky. Při zdravotních potížích se vždy poraďte s lékařem.'};
var bd={bg:'💼 Важно: Бизнес Астрологията изучава астрологичните тенденции, приложени към предприемачеството и професионалната кариера. Това четене предлага насоки за timing, силни страни и области на възможности. НЕ е финансов съвет, НЕ гарантира икономически резултати и НЕ замества съвета на квалифициран финансов консултант, адвокат или бизнес консултант.',fr:'💼 Avis important : L\'Astrologie Business étudie les tendances astrologiques appliquées à l\'entrepreneuriat et à la carrière professionnelle. Cette lecture offre des orientations sur le timing, les forces et les domaines d\'opportunité. Ce N\'EST PAS un conseil financier, NE garantit PAS de résultats économiques et NE remplace PAS les conseils d\'un conseiller financier, avocat ou consultant qualifié.',de:'💼 Wichtiger Hinweis: Business-Astrologie untersucht astrologische Trends im Unternehmertum und der beruflichen Karriere. Diese Deutung bietet Orientierung zu Timing, Stärken und Chancenbereichen. Sie ist KEINE Finanzberatung, garantiert KEINE wirtschaftlichen Ergebnisse und ersetzt NICHT den Rat eines Finanzberaters, Anwalts oder Unternehmensberaters.',it:'💼 Avviso importante: L\'Astrologia Business studia le tendenze astrologiche applicate all\'imprenditorialità e alla carriera professionale. Questa lettura offre orientamento su tempistica, punti di forza e aree di opportunità. NON è consulenza finanziaria, NON garantisce risultati economici e NON sostituisce il consiglio di un consulente finanziario, avvocato o consulente aziendale qualificato.',pt:'💼 Aviso importante: A Astrologia Business estuda as tendências astrológicas aplicadas ao empreendedorismo e à carreira profissional. Esta leitura oferece orientação sobre timing, pontos fortes e áreas de oportunidade. NÃO é aconselhamento financeiro, NÃO garante resultados económicos e NÃO substitui o conselho de um consultor financeiro, advogado ou consultor de negócios qualificado.',ru:'💼 Важно: Бизнес-астрология изучает астрологические тенденции в предпринимательстве и карьере. Это чтение предлагает ориентиры по таймингу, сильным сторонам и возможностям. Это НЕ финансовая консультация, НЕ гарантирует экономических результатов и НЕ заменяет совет финансового консультанта, юриста или бизнес-консультанта.',zh:'💼 重要提示：商业占星术研究应用于创业和职业的占星趋势。本解读提供关于时机、优势和机会领域的指导。它不是财务建议，不保证经济结果，也不能替代合格财务顾问、律师或商业顾问的建议。',ja:'💼 重要なお知らせ：ビジネス占星術は、起業やキャリアに適用される占星術のトレンドを研究します。このリーディングはタイミング、強み、機会の領域についてのガイダンスを提供します。財務アドバイスではなく、経済的な結果を保証するものではなく、資格のある財務アドバイザー、弁護士、またはビジネスコンサルタントの助言に代わるものではありません。',ko:'💼 중요 안내: 비즈니스 점성술은 창업과 직업 경력에 적용되는 점성술 트렌드를 연구합니다. 이 리딩은 타이밍, 강점 및 기회 영역에 대한 안내를 제공합니다. 재무 조언이 아니며, 경제적 결과를 보장하지 않으며, 자격 있는 재무 고문, 변호사 또는 비즈니스 컨설턴트의 조언을 대체하지 않습니다.',ar:'💼 تنبيه مهم: التنجيم التجاري يدرس الاتجاهات الفلكية المطبقة على ريادة الأعمال والمسيرة المهنية. هذه القراءة تقدم توجيهات حول التوقيت ونقاط القوة ومجالات الفرص. ليست استشارة مالية، ولا تضمن نتائج اقتصادية، ولا تحل محل مشورة مستشار مالي أو محامٍ أو مستشار أعمال مؤهل.',hi:'💼 महत्वपूर्ण सूचना: बिजनेस ज्योतिष उद्यमिता और पेशेवर करियर पर लागू ज्योतिषीय प्रवृत्तियों का अध्ययन करता है। यह रीडिंग समय, शक्तियों और अवसरों के क्षेत्रों पर मार्गदर्शन प्रदान करती है। यह वित्तीय सलाह नहीं है, आर्थिक परिणामों की गारंटी नहीं देती, और योग्य वित्तीय सलाहकार, वकील या व्यावसायिक सलाहकार की सलाह का विकल्प नहीं है।',tr:'💼 Önemli uyarı: İş Astrolojisi, girişimcilik ve profesyonel kariyere uygulanan astrolojik eğilimleri inceler. Bu okuma, zamanlama, güçlü yönler ve fırsat alanları hakkında rehberlik sunar. Finansal tavsiye DEĞİLDİR, ekonomik sonuçları GARANTİ ETMEZ ve nitelikli mali müşavir, avukat veya iş danışmanının yerini ALMAZ.',nl:'💼 Belangrijk: Zakelijke Astrologie bestudeert astrologische trends toegepast op ondernemerschap en professionele carrière. Deze lezing biedt begeleiding over timing, sterke punten en kansgebieden. Het is GEEN financieel advies, garandeert GEEN economische resultaten en vervangt NIET het advies van een gekwalificeerd financieel adviseur, advocaat of bedrijfsconsultant.',sv:'💼 Viktigt: Affärsastrologi studerar astrologiska trender tillämpade på entreprenörskap och yrkeskarriär. Denna tolkning ger vägledning om timing, styrkor och möjlighetsområden. Det är INTE finansiell rådgivning, garanterar INTE ekonomiska resultat och ersätter INTE råd från en kvalificerad finansiell rådgivare, advokat eller affärskonsult.',pl:'💼 Ważne: Astrologia Biznesowa bada trendy astrologiczne stosowane w przedsiębiorczości i karierze zawodowej. Ten odczyt oferuje wskazówki dotyczące timingu, mocnych stron i obszarów możliwości. NIE jest poradą finansową, NIE gwarantuje wyników ekonomicznych i NIE zastępuje porad kwalifikowanego doradcy finansowego, prawnika lub konsultanta biznesowego.',ro:'💼 Aviz important: Astrologia Business studiază tendințele astrologice aplicate antreprenoriatului și carierei profesionale. Această lectură oferă orientare privind timing-ul, punctele forte și zonele de oportunitate. NU este consiliere financiară, NU garantează rezultate economice și NU înlocuiește sfatul unui consultant financiar, avocat sau consultant de afaceri calificat.',el:'💼 Σημαντικό: Η Επιχειρηματική Αστρολογία μελετά τις αστρολογικές τάσεις στην επιχειρηματικότητα και την επαγγελματική σταδιοδρομία. Αυτή η ανάγνωση προσφέρει καθοδήγηση για χρονισμό, δυνατά σημεία και τομείς ευκαιριών. ΔΕΝ είναι χρηματοοικονομική συμβουλή, ΔΕΝ εγγυάται οικονομικά αποτελέσματα και ΔΕΝ αντικαθιστά τη συμβουλή εξειδικευμένου χρηματοοικονομικού συμβούλου, δικηγόρου ή επιχειρηματικού συμβούλου.',th:'💼 สำคัญ: โหราศาสตร์ธุรกิจศึกษาแนวโน้มดาราศาสตร์ที่ประยุกต์กับการประกอบธุรกิจและอาชีพ การอ่านนี้ให้คำแนะนำเกี่ยวกับจังหวะเวลา จุดแข็ง และโอกาส ไม่ใช่คำแนะนำทางการเงิน ไม่รับประกันผลลัพธ์ทางเศรษฐกิจ และไม่แทนที่คำปรึกษาจากที่ปรึกษาการเงิน ทนายความ หรือที่ปรึกษาธุรกิจ',vi:'💼 Lưu ý quan trọng: Chiêm tinh Kinh doanh nghiên cứu xu hướng chiêm tinh áp dụng cho khởi nghiệp và sự nghiệp. Bài đọc này cung cấp hướng dẫn về thời điểm, thế mạnh và lĩnh vực cơ hội. Đây KHÔNG phải tư vấn tài chính, KHÔNG đảm function buildLanguageInstruction(langCode) {
  const langObj = LANGS.find(l => l.code === langCode);
  const langName = langObj ? langObj.name : langCode;
  const isRTL = langObj && langObj.dir === 'rtl';
  const terminology = LANG_TERMINOLOGY[langCode] || '';

  let instruction = '\n\n═══ INSTRUCCIÓN DE IDIOMA ═══\n\n';
  instruction += 'IDIOMA DE LA LECTURA: ' + langName + '\n\n';
  instruction += 'Genera TODA la lectura en el idioma indicado arriba. La lectura debe sonar natural, fluida y nativa en ese idioma — NO como una traducción. Usa la terminología astrológica correcta y reconocida en cada idioma. Adapta las expresiones culturales, metáforas y referencias al contexto cultural del idioma.\n\n';

  if (terminology) {
    instruction += 'Guía de terminología:\n' + terminology + '\n\n';
  }

  if (isRTL) {
    instruction += 'IMPORTANTE: Generar texto de derecha a izquierda dir="rtl"\n\n';
  }

  instruction += '═══ REGLAS DE ADAPTACIÓN CULTURAL ═══\n';
  LANG_ADAPTATION_RULES.forEach((rule, i) => {
    instruction += (i + 1) + '. ' + rule + '\n';
  });

  return instruction;
}

// === CANVAS STARS ANIMATION ===
function initStars() {
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let stars = [];
  const STAR_COUNT = 200;
  const colors = ['#ffffff', '#F0CC6B', '#D4A843', '#9B6FDF', '#EDE8F5'];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function createStars() {
    stars = [];
    for (let i = 0; i < STAR_COUNT; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.5 + 0.3,
        color: colors[Math.floor(Math.random() * colors.length)],
        twinkleSpeed: Math.random() * 0.02 + 0.005,
        twinkleOffset: Math.random() * Math.PI * 2,
        opacity: Math.random() * 0.5 + 0.3,
      });
    }
  }

  function draw(time) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      const alpha = s.opacity + Math.sin(time * s.twinkleSpeed + s.twinkleOffset) * 0.3;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = s.color;
      ctx.globalAlpha = Math.max(0.05, Math.min(1, alpha));
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }

  resize();
  createStars();
  requestAnimationFrame(draw);
  window.addEventListener('resize', () => { resize(); createStars(); });
}

// === FLOATING PARTICLES ===
function initParticles() {
  const container = document.getElementById('particles');
  const particleColors = ['#D4A843', '#F0CC6B', '#7B4FBF', '#9B6FDF', '#D4A843', '#F0CC6B'];
  for (let i = 0; i < 12; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    const size = Math.random() * 4 + 2;
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    el.style.left = Math.random() * 100 + '%';
    el.style.background = particleColors[i % particleColors.length];
    el.style.animationDuration = (Math.random() * 20 + 15) + 's';
    el.style.animationDelay = (Math.random() * 15) + 's';
    container.appendChild(el);
  }
}

// === CONCERN SELECTOR LOGIC ===
function initConcernSelector() {
  var pills = document.querySelectorAll('.concern-pill');
  pills.forEach(function(pill) {
    pill.addEventListener('click', function() {
      pills.forEach(function(p) { p.classList.remove('active'); });
      this.classList.add('active');
      applyConcernFilter(this.dataset.concern);
    });
  });
}

function applyConcernFilter(concernId) {
  var concern = CONCERNS.find(function(c) { return c.id === concernId; });
  var cards = document.querySelectorAll('.trad-card');
  var recoPanel = document.getElementById('concern-reco-panel');
  var recoDesc = document.getElementById('concern-reco-desc');
  var recoProducts = document.getElementById('concern-reco-products');
  var recoCta = document.getElementById('concern-reco-cta-btn');

  if (concernId === 'all' || !concern) {
    cards.forEach(function(card) { card.classList.remove('dimmed', 'highlighted'); });
    recoPanel.classList.remove('visible');
    return;
  }

  cards.forEach(function(card) {
    var tradId = card.dataset.tradId;
    if (concern.traditions.indexOf(tradId) !== -1) {
      card.classList.remove('dimmed');
      card.classList.add('highlighted');
    } else {
      card.classList.remove('highlighted');
      card.classList.add('dimmed');
    }
  });

  recoDesc.textContent = ct(concern.desc);

  var productsHtml = '';
  concern.products.forEach(function(pid) {
    var prod = findProduct(pid) || findPack(pid);
    if (prod) {
      var price = prod.origPrice ? fmtPrice(calcLocalPrice(prod.price)) : localPrice(prod);
      productsHtml += '<a href="javascript:void(0)" class="concern-reco-product" onclick="openProductModal(\'' + prod.id + '\')">' +
        '<span>' + (prod.sidebarSymbol || '✦') + '</span>' +
        '<span class="concern-reco-product-name">' + ct(prod.name) + '</span>' +
        '<span class="concern-reco-product-price">' + price + '</span>' +
        '</a>';
    }
  });
  recoProducts.innerHTML = productsHtml;

  recoCta.textContent = t('concernCtaBtn') || '\u2726 Consultar sobre esto';
  recoCta.onclick = function() {
    openConcernForm(concernId);
  };

  recoPanel.classList.add('visible');

  if (window.posthog) {
    posthog.capture('concern_selected', { concern: concernId, label: ct(concern.label) });
  }
}

var _activeConcernId = null;

function openConcernForm(concernId) {
  _activeConcernId = concernId;
  var concern = CONCERNS.find(function(c) { return c.id === concernId; });
  var categoryLabel = concern ? ct(concern.label) : '';
  var modal = document.getElementById('concern-form-modal');

  modal.innerHTML =
    '<button class="concern-form-close" onclick="closeConcernForm()">\u2715</button>' +
    '<h2>' + (t('concernFormTitle') || '\u2726 Cuéntame tu inquietud') + '</h2>' +
    '<p class="concern-form-sub">' + (t('concernFormSub') || 'Te responderé personalmente en menos de 24 horas con una orientación inicial gratuita.') + '</p>' +
    '<form id="concern-form" onsubmit="submitConcernForm(event)">' +
      '<label>' + (t('fName') || 'Nombre') + ' *</label>' +
      '<input type="text" id="cf-name" required placeholder="' + (t('fName') || 'Tu nombre') + '">' +
      '<label>' + (t('fEmail') || 'Email') + ' *</label>' +
      '<input type="email" id="cf-email" required placeholder="' + (t('fEmail') || 'tu@email.com') + '">' +
      '<label>' + (t('concernFormInquiry') || 'Tu inquietud') + ' *</label>' +
      '<textarea id="cf-concern" required placeholder="' + (t('concernFormPlaceholder') || 'Cuéntame qué te preocupa o qué necesitas entender...') + '"></textarea>' +
      '<input type="hidden" id="cf-category" value="' + categoryLabel + '">' +
      '<button type="submit" class="concern-form-submit">' + (t('concernFormBtn') || '\u2726 Enviar mi consulta') + '</button>' +
    '</form>';

  document.getElementById('concern-form-overlay').classList.add('active');

  if (window.posthog) {
    posthog.capture('concern_form_opened', { concern: concernId, category: categoryLabel });
  }
}

function closeConcernForm() {
  document.getElementById('concern-form-overlay').classList.remove('active');
}

function submitConcernForm(e) {
  e.preventDefault();
  var btn = e.target.querySelector('.concern-form-submit');
  var name = document.getElementById('cf-name').value.trim();
  var email = document.getElementById('cf-email').value.trim();
  var concern = document.getElementById('cf-concern').value.trim();
  var category = document.getElementById('cf-category').value;

  if (!name || !email || !concern) return;

  btn.disabled = true;
  btn.textContent = t('leadLoading') || 'Enviando...';

  fetch('/api/contact', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Accept-Language': i18next.language || 'es' },
    body: JSON.stringify({ name: name, email: email, concern: concern, category: category })
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    var modal = document.getElementById('concern-form-modal');
    modal.innerHTML =
      '<button class="concern-form-close" onclick="closeConcernForm()">\u2715</button>' +
      '<div class="concern-form-success">' +
        '<h3>' + (t('concernFormSuccessTitle') || '\u2726 Consulta recibida') + '</h3>' +
        '<p>' + (t('concernFormSuccessMsg') || 'Gracias, ' + name + '. Recibirás una orientación personalizada en tu email en menos de 24 horas.') + '</p>' +
      '</div>';

    if (window.posthog) {
      posthog.capture('concern_form_submitted', { concern: _activeConcernId, category: category, email: email });
    }
  })
  .catch(function(err) {
    btn.disabled = false;
    btn.textContent = t('concernFormBtn') || '\u2726 Enviar mi consulta';
    alert(t('concernFormError') || 'Error al enviar. Inténtalo de nuevo.');
  });
}

function submitDailySubscribe(e) {
  e.preventDefault();
  var form = document.getElementById('daily-subscribe-form');
  var btn = document.getElementById('daily-subscribe-btn');
  var fd = new FormData(form);

  btn.disabled = true;
  btn.textContent = t('leadLoading30') || 'Calculando tu mapa energético de 30 días...';

  fetch('/api/subscribe-horoscope', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      email: fd.get('email'),
      customerName: fd.get('customerName'),
      sunSign: fd.get('sunSign'),
      lang: (navigator.language || 'es').split('-')[0],
    }),
  })
  .then(function(res) {
    if (!res.ok) {
      return res.text().then(function(txt) {
        try { return JSON.parse(txt); } catch(e) { return { error: 'Error del servidor (' + res.status + ')' }; }
      });
    }
    return res.json();
  })
  .then(function(data) {
    if (data.error) {
      btn.disabled = false;
      btn.textContent = t('dailyBtn') || 'Suscribirme gratis';
      alert(data.error);
      return;
    }
    form.style.display = 'none';
    document.getElementById('daily-subscribe-success').style.display = 'block';
  })
  .catch(function(err) {
    console.error('Subscribe error:', err);
    btn.disabled = false;
    btn.textContent = t('dailyBtn') || 'Suscribirme gratis';
    alert('Error de conexion. Intenta de nuevo.');
  });
}

function toggleFaq(el) {
  const wasOpen = el.classList.contains('open');
  // Close all
  document.querySelectorAll('.faq-item.open').forEach(function(item) {
    item.classList.remove('open');
    item.querySelector('.faq-a').style.maxHeight = '0';

  // Toggle clicked

    el.classList.add('open');
    const a = el.querySelector('.faq-a');
    a.style.maxHeight = a.scrollHeight + 'px';
  }
}

// Pre-fill form when returning customer enters their email
function attachEmailPrefill(modal) {
  const form = modal.querySelector('form');
  if (!form) return;
  const inputs = form.querySelectorAll('input, select, textarea');
  // field_5 = email input
  const emailInput = inputs[5];
  if (!emailInput || emailInput.type !== 'email') return;

  emailInput.addEventListener('blur', function() {
    const email = emailInput.value.trim();
    if (!email || !email.includes('@')) return;

    fetch('/api/customer/birth-data?email=' + encodeURIComponent(email))
      .then(r => r.json())
      .then(data => {
        if (!data.found) return;
        // field_0=Name, field_1=BirthDate, field_2=BirthTime, field_3=City, field_4=Country
        if (data.fullName && !inputs[0].value) inputs[0].value = data.fullName;
        if (data.birthDate && !inputs[1].value) inputs[1].value = data.birthDate;
        if (data.birthTime && !inputs[2].value) inputs[2].value = data.birthTime;
        if (data.birthCity && !inputs[3].value) inputs[3].value = data.birthCity;
        if (data.birthCountry && !inputs[4].value) inputs[4].value = data.birthCountry;
      })
      .catch(() => {}); // Silent fail - pre-fill is optional
  });
}

let currentCheckoutData = null;

function openCheckout(readingRequest, product) {
  currentCheckoutData = readingRequest;
  const overlay = document.getElementById('checkout-overlay');
  if (!overlay) { console.error('checkout-overlay not found'); return; }

  const productName = product ? ct(product.name) : readingRequest.productId;
  const sTier = readingRequest.serviceTier || 'basic';
  const tierMult = SERVICE_TIER_MULT[sTier];
  const price = product ? fmtPrice((findPack(readingRequest.productId) ? calcLocalPrice(product.price) : calcLocalPrice(product.price)) * tierMult) : '';
  const email = readingRequest.formData.field_5 || '';
  const isPack = !!findPack(readingRequest.productId);

  // Checkout title
  document.getElementById('checkout-title').textContent = t('checkoutTitle') || 'Confirmar Pedido';
  document.getElementById('checkout-product').textContent = productName;
  document.getElementById('checkout-price').textContent = price;
  document.getElementById('checkout-note').textContent = t('checkoutNote') || 'Entrega instantánea en tu email en formato PDF';

  // Order summary
  let summaryHtml = '';
  if (sTier === 'premium') {
    summaryHtml += `<div class="checkout-summary-row" style="color:#F7D96E"><span>⭐ ${t('tierPremium') || 'Premium'}</span><span></span></div>`;

  }
  if (isPack) {
    const pack = findPack(readingRequest.productId);
    pack.includes.forEach(refId => {
      const ref = findProduct(refId);
      if (ref) summaryHtml += `<div class="checkout-summary-row"><span>${ct(ref.name)}</span><span>${fmtPrice(calcLocalPrice(ref.price) * tierMult)}</span></div>`;
    });
    summaryHtml += `<div class="checkout-summary-row" style="color:#55efc4"><span>${t('save') || 'Ahorro'}</span><span>-${fmtPrice((calcLocalPrice(pack.origPrice) - calcLocalPrice(pack.price)) * tierMult)}</span></div>`;
    summaryHtml += `<div class="checkout-summary-row total"><span>Total</span><span>${price}</span></div>`;
  } else {
    summaryHtml += `<div class="checkout-summary-row"><span>${productName}</span><span>${price}</span></div>`;
    summaryHtml += `<div class="checkout-summary-row total"><span>Total</span><span>${price}</span></div>`;
  }
  document.getElementById('checkout-summary').innerHTML = summaryHtml;

  // Email
  if (email) {
    document.getElementById('checkout-email').innerHTML = `${t('checkoutEmail') || 'Enviaremos tu lectura a:'} <strong>${email}</strong>`;
  } else {
    document.getElementById('checkout-email').textContent = '';
  }

  // Update button labels
  const stripeBtn = overlay.querySelector('.pay-stripe .pay-label');
  const paypalBtn = overlay.querySelector('.pay-paypal .pay-label');
  if (stripeBtn) stripeBtn.textContent = t('payCard') || 'Pagar con Tarjeta';
  if (paypalBtn) paypalBtn.textContent = t('payPaypal') || 'Pagar con PayPal';

  if (divider) divider.textContent = t('payOr') || 'o';

  const secureTxt = overlay.querySelector('.checkout-secure');
  if (secureTxt) secureTxt.innerHTML = `<span class="lock">🔒</span> ${t('checkoutSecure') || 'Pago 100% seguro · Datos encriptados SSL'}`;

  if (guarantee) guarantee.innerHTML = `<strong>✦ ${t('checkoutGuaranteeTitle') || 'Garantía'}:</strong> ${t('checkoutGuarantee') || 'Si no recibes tu lectura en los primeros 10 minutos tras el pago, contáctanos y te la reenviamos de inmediato — o te devolvemos el 100% del dinero. Sin preguntas.'}`;

function payWithPayPal() {
  if (!currentCheckoutData) return;
  const data = currentCheckoutData;
  const product = findProduct(data.productId) || findPack(data.productId);
  const sTierMult = SERVICE_TIER_MULT[data.serviceTier || 'basic'];
  const localAmt = product ? calcLocalPrice(product.price) * sTierMult : 0;
  const productName = product ? (product.name || data.productId) : data.productId;
  const email = PAYMENT_CONFIG.paypalEmail;

  // PayPal supported currencies (fall back to USD for unsupported)
  var ppSupported = ['EUR','USD','GBP','JPY','CAD','AUD','BRL','MXN','PLN','CZK','SEK','ILS','THB','INR','TRY'];
  var ppCurrency = ppSupported.indexOf(currentPricing.currencyCode) !== -1 ? currentPricing.currencyCode : 'USD';
  var ppAmount = ppCurrency === currentPricing.currencyCode ? localAmt : calcLocalPrice(product ? product.price : 0);
  // If falling back to USD, recalculate
  if (ppCurrency !== currentPricing.currencyCode && product) {
    var usdRate = FX_RATES.USD || 1.08;
    var mult = PRICING_TIERS[currentPricing.tier];
    ppAmount = psychoRound(product.price * mult * usdRate, 'USD');
  }

  console.log('🅿️ PayPal Payment:', { product: data.productId, amount: ppAmount, currency: ppCurrency });

  if (email) {
    var paypalUrl = 'https://www.paypal.com/cgi-bin/webscr?cmd=_xclick' +
      '&business=' + encodeURIComponent(email) +
      '&item_name=' + encodeURIComponent(productName + ' - Astro Aureum') +
      '&amount=' + ppAmount.toFixed(2) +
      '&currency_code=' + ppCurrency +
      '&no_shipping=1' +
      '&return=' + encodeURIComponent('https://astroaureum.com') +
      '&cancel_return=' + encodeURIComponent('https://astroaureum.com/#catalog');
    window.location.href = paypalUrl;
  } else {
    alert('PayPal no está configurado.');
  }
}

// === SCROLL REVEAL (IntersectionObserver) ===
function initScrollReveal() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry, i) => {
      if (entry.isIntersecting) {
        setTimeout(() => entry.target.classList.add('active'), i * 80);
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
}

// === SCROLL SPY ===
function initScrollSpy() {
  const sections = ['occidental','cabalistica','vedica','china','especializado','alma','celestial','humandesign','packs'];
  const sectionEls = sections.map(id => document.getElementById(id)).filter(Boolean);

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const id = entry.target.id;
        // Find matching category and expand it
        document.querySelectorAll('.sidebar-item.active').forEach(el => el.classList.remove('active'));

        // Map section ids to cat ids
        const catMap = { occidental:'occ', cabalistica:'cab', vedica:'ved', china:'chi', especializado:'esp', alma:'alm', celestial:'cel', humandesign:'hd', packs:'packs' };
        const catId = catMap[id];
        if (catId) {
          const catEl = document.querySelector(`.sidebar-cat[data-cat="${catId}"]`);
          if (catEl) {
            const head = catEl.querySelector('.sidebar-cat-head');
            const items = catEl.querySelector('.sidebar-cat-items');
            if (head && !head.classList.contains('open')) {
              head.classList.add('open');
              items.classList.add('open');
            }
          }
        }
      }
    });
  }, { threshold: 0.2 });

  sectionEls.forEach(el => observer.observe(el));
}

// === LANGUAGE SWITCH ===
function setLanguage(code) {
  currentLang = code;
  const lang = LANGS.find(l => l.code === code);
  document.documentElement.lang = code;
  document.documentElement.dir = lang ? lang.dir : 'ltr';
  // Actualizar URL a /xx/
  window.history.pushState({}, '', '/' + code + '/');
  // Cambiar idioma en i18next (carga JSON si no esta en cache)
  i18next.changeLanguage(code).then(function() {
    // Actualizar meta tags para SEO dinamico
    document.title = 'Astro Aureum | ' + t('heroTitle');
    var metaDesc = document.querySelector('meta[name="description"]');
    if (metaDesc) metaDesc.content = t('heroDesc');
    var ogTitle = document.querySelector('meta[property="og:title"]');
    if (ogTitle) ogTitle.content = 'Astro Aureum | ' + t('heroTitle');
    var ogDesc = document.querySelector('meta[property="og:description"]');
    if (ogDesc) ogDesc.content = t('heroSub') + ' — ' + t('heroDesc');
    var twTitle = document.querySelector('meta[property="twitter:title"]');
    if (twTitle) twTitle.content = 'Astro Aureum | ' + t('heroTitle');
    var twDesc = document.querySelector('meta[property="twitter:description"]');
    if (twDesc) twDesc.content = t('heroSub') + ' — ' + t('heroDesc');
    // Actualizar canonical con path de idioma
    var canonical = document.querySelector('link[rel="canonical"]');
    if (canonical) canonical.href = 'https://astroaureum.com/' + code + '/';
    renderAll();
  });
}

function detectLanguage() {
  // 1. URL path /xx/ tiene prioridad (SEO)
  var pathMatch = window.location.pathname.match(/^\/([a-z]{2})\/?$/);
  if (pathMatch) {
    var pathLang = pathMatch[1];
    var supported = LANGS.find(function(l) { return l.code === pathLang; });
    if (supported) { currentLang = pathLang; currentLocale = pathLang; return; }
  }
  // 2. URL param ?lang=xx (compatibilidad con links antiguos)
  var urlParams = new URLSearchParams(window.location.search);
  var urlLang = urlParams.get('lang');
  if (urlLang) {
    var supported2 = LANGS.find(function(l) { return l.code === urlLang; });
    if (supported2) {
      currentLang = urlLang; currentLocale = urlLang;
      window.history.replaceState({}, '', '/' + urlLang + '/');
      return;
    }
  }
  // 3. Fallback: idioma del navegador
  var fullLocale = navigator.language || 'es-ES';
  currentLocale = fullLocale;
  var navLang = fullLocale.slice(0, 2);
  var supported3 = LANGS.find(function(l) { return l.code === navLang; });
  if (supported3) currentLang = navLang;
}

// === 3D TILT EFFECT ON CARDS ===
function initCard3DTilt() {
  var main = document.querySelector('.main-content');
  if (!main) return;

  main.addEventListener('mousemove', function(e) {
    var card = e.target.closest('.prod-card, .pack-card, .trad-card');
    if (!card) return;
    var rect = card.getBoundingClientRect();
    var x = e.clientX - rect.left;
    var y = e.clientY - rect.top;
    var centerX = rect.width / 2;
    var centerY = rect.height / 2;
    var rotateX = ((y - centerY) / centerY) * -8;
    var rotateY = ((x - centerX) / centerX) * 8;
    card.style.transform = 'perspective(600px) rotateX(' + rotateX + 'deg) rotateY(' + rotateY + 'deg) scale(1.02)';
  });

  main.addEventListener('mouseleave', function(e) {
    var card = e.target.closest('.prod-card, .pack-card, .trad-card');
    if (card) card.style.transform = '';
  }, true);

  main.addEventListener('mouseout', function(e) {
    var card = e.target.closest('.prod-card, .pack-card, .trad-card');
    var related = e.relatedTarget;
    if (card && (!related || !card.contains(related))) {
      card.style.transform = '';
    }
  });
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  var words = text.split(' ');
  var line = '';
  var lines = [];
  for (var i = 0; i < words.length; i++) {
    var test = line + words[i] + ' ';
    if (ctx.measureText(test).width > maxWidth && i > 0) {
      lines.push(line.trim());
      line = words[i] + ' ';
    } else {
      line = test;
    }
  }
  lines.push(line.trim());
  for (var j = 0; j < lines.length; j++) {
    ctx.fillText(lines[j], x, y + j * lineHeight);
  }
  return y + lines.length * lineHeight;
}

  // -- Background gradient --
  var bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#06050E');
  bgGrad.addColorStop(0.35, '#1A1040');
  bgGrad.addColorStop(0.65, '#1A1040');
  bgGrad.addColorStop(1, '#06050E');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // -- Decorative stars --
  for (var i = 0; i < 80; i++) {
    var sx = Math.random() * W;
    var sy = Math.random() * H;
    var sr = Math.random() * 2 + 0.5;
    var alpha = Math.random() * 0.6 + 0.1;
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
    ctx.fillStyle = Math.random() > 0.7 ? 'rgba(212,168,67,' + alpha + ')' : 'rgba(255,255,255,' + alpha + ')';

  // -- Subtle radial glow --

            <div class="ladder-price">${t('ladderMidPrice') || 'Desde €22'}</div>
            <button class="ladder-btn-mid" onclick="closeFreeReading();scrollTo('#catalog');">${t('ladderMidBtn') || 'Ver opciones desde €22'}</button>
          </div>
          <div class="ladder-card ladder-prem">
            <span class="ladder-tag">${t('ladderPremTag') || 'PREMIUM'}</span>
            <div class="ladder-icon">&#10022;</div>
            <h3>${t('ladderPremTitle') || 'Tu Carta Natal Completa'}</h3>
            <p>${t('ladderPremDesc') || '36 páginas de análisis profundo. Tu mapa cósmico definitivo.'}</p>
            <div class="ladder-price">${t('ladderPremPrice') || 'Desde €139'}</div>
            <button class="ladder-btn-prem" onclick="closeFreeReading();scrollTo('#catalog');">${t('ladderPremBtn') || 'Descubrir mi Carta Natal'}</button>
            <p class="ladder-packs">${t('ladderPremPacks') || 'O elige un Pack desde €179 con hasta 40% de ahorro'}</p>
          </div>
        </div>
      </div>
      ${readingUrl ? '<div style="text-align:center;margin:24px 0;"><a href="' + readingUrl + '" target="_blank" style="color:#9B8EC4;font-size:0.85rem;">Ver lectura online →</a></div>' : ''}
      <div style="text-align:center;margin-top:32px;padding-top:16px;border-top:1px solid rgba(247,217,110,0.08);">
        <p style="color:#6B5B8D;font-size:0.75rem;">© ${new Date().getFullYear()} Astro Aureum</p>
      </div>
    </div>`;
  requestAnimationFrame(function() { overlay.classList.add('active'); });
  overlay.scrollTop = 0;
}

function closeFreeReading() {
  var overlay = document.getElementById('free-reading-overlay');
  if (overlay) { overlay.classList.remove('active'); }
  // Mark lead as completed and show buy float bar
  sessionStorage.setItem('lead_completed', '1');
  showBuyBar();
}

// === LADDER FREE CLICK ===
function ladderFreeClick() {
  if (window._userSubscribedDaily) return;
  closeFreeReading();
  scrollTo('#horoscopo-diario');
}

// === BUY FLOATING BAR ===
function showBuyBar() {
  // Hide viral bar, show buy bar
  var viralBar = document.getElementById('viral-float-bar');
  if (viralBar) viralBar.classList.remove('visible');
  var bar = document.getElementById('buy-float-bar');
  if (!bar) return;
  var bfText = document.getElementById('bf-text');
  var bfBtn = document.getElementById('bf-btn');
  if (bfText) bfText.textContent = t('buyFloatText') || '✦ Tu lectura completa te espera';
  if (bfBtn) bfBtn.textContent = t('buyFloatBtn') || 'Ver Carta Natal — desde €139';
  requestAnimationFrame(function() { bar.classList.add('visible'); });
}

function closeBuyBar() {
  var bar = document.getElementById('buy-float-bar');
  if (bar) bar.classList.remove('visible');
  sessionStorage.setItem('buy_bar_closed', '1');
}

function initBuyBar() {
  // If user already completed lead and hasn't closed buy bar, show it
  if (sessionStorage.getItem('lead_completed') && !sessionStorage.getItem('buy_bar_closed')) {
    showBuyBar();
  }
}

// === VIRAL FLOATING BAR ===
function initViralBar() {
  if (sessionStorage.getItem('lead_completed')) return; // Buy bar takes priority
  var bar = document.getElementById('viral-float-bar');
  if (!bar) return;
  // Actualizar textos segun idioma
  var vfText = document.getElementById('vf-text');
  var vfLabel = document.getElementById('vf-share-label');
  if (vfText) vfText.textContent = t('viralFloatText') || 'Conoce tu destino cosmico gratis';
  if (vfLabel) vfLabel.textContent = t('viralFloatShare') || 'Compartir';
  // Mostrar despues de 8 segundos de scroll
  var shown = false;
  window.addEventListener('scroll', function() {
    if (shown) return;
    if (window.scrollY > 600) { bar.classList.add('visible'); shown = true; }
  });
}

function viralFloatShare(platform) {
  var shareText = t('viralFloatText') || 'Conoce tu destino cosmico gratis';
  var shareUrl = 'https://astroaureum.com/' + currentLang + '/';
  if (platform === 'whatsapp') {
    window.open('https://api.whatsapp.com/send?text=' + encodeURIComponent(shareText + '\n' + shareUrl), '_blank');
  } else if (platform === 'native') {
    if (navigator.share) {
      navigator.share({ title: 'Astro Aureum', text: shareText, url: shareUrl }).catch(function(){});
    } else {
      try {
        navigator.clipboard.writeText(shareUrl).then(function() {
          alert('Link copiado!');
        });
      } catch(e) {
        // Fallback: input temporal
        var inp = document.createElement('input');
        inp.value = shareUrl;
        document.body.appendChild(inp);
        inp.select();
        document.execCommand('copy');
        document.body.removeChild(inp);
        alert('Link copiado!');
      }
    }
  }
}

// === INIT ===
function init() {
  detectLanguage();
  detectPricing();
  initStars();
  initParticles();
  // Initialize i18next with detected language, then render
  initI18next(currentLang).then(function() {
    renderAll();
    initMobileSidebar();
    initScrollSpy();
    initModalClickOutside();
    initCardClicks();
    initCard3DTilt();
    initTestMode();
    fetchServerPricing();
    initViralBar();
    initBuyBar();
  });
}

document.addEventListener('DOMContentLoaded', init);
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
